name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run test suite
        run: pytest tests/ -v --cov=wjpy --cov-report=term-missing

      - name: Verify examples run cleanly
        run: |
          python examples/example_01_quickstart.py
          python examples/example_02_sign_inversion_detection.py
          python examples/example_03_pairing_family_type1_gap.py
          python examples/example_04_rolling_regime_trajectory.py
